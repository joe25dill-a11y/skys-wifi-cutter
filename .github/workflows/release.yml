name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run desktop:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with installer and checksum
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$version"
          $installer = "$env:LOCALAPPDATA\SkysWiFiCutterBuild\Skys.WiFi.Cutter.Setup.exe"
          if (-not (Test-Path $installer)) { throw "Installer not found: $installer" }

          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash.ToLower()
          $checksumName = "Skys-WiFi-Cutter-v$version-sha256.txt"
          $checksumPath = Join-Path $env:RUNNER_TEMP $checksumName
          @(
            "Skys WiFi Cutter v$version SHA256 checksum",
            "",
            "File: Skys.WiFi.Cutter.Setup.exe",
            "SHA256: $hash"
          ) | Set-Content -Path $checksumPath -Encoding UTF8

          Write-Host "SHA256: $hash"

          if (gh release view $tag 2>$null) {
            gh release upload $tag $installer $checksumPath --clobber
            Write-Host "Updated assets on existing release $tag"
          } else {
            gh release create $tag $installer $checksumPath `
              --title "Skys WiFi Cutter v$version" `
              --notes "Windows beta installer. Run as Administrator. SmartScreen may warn (unsigned)."
          }
